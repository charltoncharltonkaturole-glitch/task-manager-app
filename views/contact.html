<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Admin - Task Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📋 TaskManager</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-link">📝 My Tasks</a>
                <a href="/contact" class="nav-link active">📧 Contact Admin</a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <span id="userName"></span>
                </div>
                <button id="logoutBtn" class="btn-logout">🚪 Logout</button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
                <div class="theme-toggle">
                    <button id="darkModeToggle" class="theme-btn">🌙</button>
                </div>
            </div>
            
            <div class="contact-card">
                <h1>Contact Administrator</h1>
                <p>Have questions or feedback? Send me a message directly!</p>
                
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Your Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    
                    <div id="contactError" class="error-msg"></div>
                    <div id="contactSuccess" class="success-msg"></div>
                    
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </main>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;
            const errorDiv = document.getElementById('contactError');
            const successDiv = document.getElementById('contactSuccess');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, subject, message })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = 'Message sent successfully! I will get back to you soon.';
                    document.getElementById('contactForm').reset();
                } else {
                    errorDiv.textContent = data.error;
                }
            } catch (err) {
                errorDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
